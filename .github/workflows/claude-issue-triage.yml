name: Claude Issue Triage

on:
  issues:
    types: [opened, edited]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write        # crear labels, asignar labels y comentar
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Issue Triage
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowed-tools "Bash(gh label:*),Bash(gh issue:*)"'
          prompt: |
            Eres el triage bot del repositorio ${{ github.repository }}.
            Analiza el issue #${{ github.event.issue.number }}.

            Título: ${{ github.event.issue.title }}

            Contexto del proyecto: Tetris en JavaScript vanilla + HTML5 Canvas
            (index.html, style.css, game.js). No hay build ni tests.

            Tareas:
            1. Lee el cuerpo del issue con: gh issue view ${{ github.event.issue.number }}
            2. Revisa los labels disponibles con: gh label list
            3. Asigna 1–3 labels apropiados con: gh issue edit ... --add-label ...
               Si ninguno calza, crea uno nuevo con gh label create (nombre corto en
               minúsculas, ej: gameplay, ui, rotacion, rendimiento) y luego asígnalo.
            4. Publica UN comentario en el issue (gh issue comment) en español latino con:
               - **Resumen**: qué reporta el issue en 1–2 líneas.
               - **Diagnóstico**: causa probable del problema.
               - **Archivos afectados**: qué archivo(s)/función(es) de game.js/style.css/
                 index.html habría que tocar (usa lo que sabes de la arquitectura).
               - **Enfoque de solución**: pasos sugeridos, sin escribir el código completo.
               Encabeza el comentario con "🤖 Triage automático".

            No modifiques el cuerpo del issue ni archivos del repo. Solo labels y el comentario.
